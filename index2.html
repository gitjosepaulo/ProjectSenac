<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caderno Estilo Notebook</title>
  <style>
    :root {
      --page: #fffaf3;
      --line: #d9cbb8;
      --ink: #3d3a34;
      --accent: #8b6a4d;
      --shadow: rgba(51, 38, 24, 0.25);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background:
        radial-gradient(circle at top, #f4efe8 0, #d8d0c6 35%, #b2a99d 100%);
      color: var(--ink);
    }

    .frame {
      width: min(96vw, 980px);
      padding: 24px;
      border-radius: 30px;
      background: linear-gradient(145deg, #b49575, #8f745f 45%, #6f5b48 100%);
      box-shadow: 0 18px 35px var(--shadow);
    }

    .notebook {
      border-radius: 24px;
      overflow: hidden;
      background: #efe4d4;
      border: 1px solid rgba(255, 255, 255, 0.35);
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.08);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px;
      background: linear-gradient(180deg, #7e6651, #6d5844);
      color: #fffaf3;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-size: 0.95rem;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.14);
      font-size: 0.82rem;
      text-transform: none;
      letter-spacing: 0;
    }

    .page {
      position: relative;
      min-height: 540px;
      background: var(--page);
      padding: 14px 18px 16px 60px;
      overflow: hidden;
    }

    .page::before {
      content: "";
      position: absolute;
      top: 0;
      left: 42px;
      bottom: 0;
      width: 2px;
      background: linear-gradient(180deg, rgba(120, 101, 79, 0.35), rgba(120, 101, 79, 0.08));
      z-index: 1;
    }

    .page::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image: linear-gradient(var(--line) 1px, transparent 1px);
      background-size: 100% 36px;
      opacity: 0.85;
      pointer-events: none;
    }

    .line {
      position: relative;
      height: 36px;
      display: flex;
      align-items: center;
      z-index: 2;
      color: #5d5449;
      font-size: 1rem;
      padding-left: 8px;
    }

    .line::before {
      content: "";
      position: absolute;
      left: -40px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(142, 118, 91, 0.18);
      border: 1px solid rgba(142, 118, 91, 0.35);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.35);
    }

    .title {
      position: relative;
      z-index: 2;
      font-size: 1.1rem;
      font-weight: 700;
      color: #433a31;
      margin: 8px 0 2px;
      letter-spacing: 0.3px;
    }

    .sub {
      position: relative;
      z-index: 2;
      font-size: 0.9rem;
      color: #6e6458;
      margin-bottom: 8px;
    }

    .spiral {
      position: absolute;
      left: 12px;
      top: 18px;
      bottom: 18px;
      width: 26px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      z-index: 3;
      pointer-events: none;
    }

    .spiral span {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid rgba(109, 88, 68, 0.65);
      background: radial-gradient(circle at 30% 30%, #fffaf3 0, #efe2d1 45%, #ddcbb0 100%);
      box-shadow: 0 4px 8px rgba(0,0,0,0.06);
    }

    .note {
      position: absolute;
      z-index: 2;
      font-size: 0.92rem;
      color: #705d49;
      background: rgba(255, 255, 255, 0.55);
      border: 1px solid rgba(126, 102, 81, 0.18);
      border-radius: 10px;
      padding: 6px 8px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
      animation: float 4s ease-in-out infinite;
    }

    .note.one { top: 78px; right: 46px; }
    .note.two { bottom: 82px; right: 62px; animation-delay: -1.5s; }
    .note.three { top: 152px; right: 110px; animation-delay: -3s; }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 10px 12px 0;
      color: #f7efe6;
      font-size: 0.92rem;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 8px 12px;
      background: #fffaf3;
      color: #5b4b3d;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 6px 14px rgba(0,0,0,0.12);
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    @media (max-width: 700px) {
      .frame { padding: 10px; }
      .page { min-height: 460px; padding-left: 52px; }
      .topbar { flex-direction: column; align-items: flex-start; gap: 6px; }
      .footer { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <main class="frame">
    <section class="notebook" aria-label="Imagem de um caderno aberto">
      <div class="topbar">
        <span>📓 Caderno de estudos</span>
        <span class="chip" id="clock">Carregando hora…</span>
      </div>
      <article class="page">
        <div class="spiral" id="spiral" aria-hidden="true"></div>
        <div class="title">Anotações do dia</div>
        <div class="sub">Linhas delicadas, espiral realista e um visual de caderno.</div>
        <div id="lines"></div>
        <div class="note one">Ideias</div>
        <div class="note two">Tarefas</div>
        <div class="note three">Resumo</div>
      </article>
      <div class="footer">
        <span>Gerado com HTML, CSS e JavaScript</span>
        <button type="button" id="refresh">Novo caderno</button>
      </div>
    </section>
  </main>

  <script>
    const lines = document.getElementById('lines');
    const spiral = document.getElementById('spiral');
    const refreshBtn = document.getElementById('refresh');
    const clock = document.getElementById('clock');

    function createLines() {
      lines.innerHTML = '';
      const frases = [
        'Estudar com calma e constância.',
        'Revisar o conteúdo principal.',
        'Anotar ideias importantes.',
        'Resolver exercícios com atenção.',
        'Organizar o material por tema.',
        'Marcar dúvidas para revisar depois.',
        'Criar um resumo rápido no fim.',
        'Praticar todos os dias um pouco.'
      ];

      for (let i = 0; i < 12; i++) {
        const linha = document.createElement('div');
        linha.className = 'line';
        linha.textContent = frases[(i + Math.floor(Math.random() * 3)) % frases.length];
        lines.appendChild(linha);
      }
    }

    function createSpiral() {
      spiral.innerHTML = '';
      for (let i = 0; i < 10; i++) {
        const dot = document.createElement('span');
        spiral.appendChild(dot);
      }
    }

    function updateClock() {
      const now = new Date();
      clock.textContent = now.toLocaleTimeString('pt-BR', {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });
    }

    refreshBtn.addEventListener('click', () => {
      createLines();
      createSpiral();
      updateClock();
    });

    createLines();
    createSpiral();
    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
